<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Módulo de Autenticação - Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-gradient-1: #0f172a;
      --bg-gradient-2: #1e1b4b;
      --card-bg: rgba(255, 255, 255, 0.07);
      --card-border: rgba(255, 255, 255, 0.15);
      --text: #f8fafc;
      --text-secondary: #94a3b8;
      --input-bg: rgba(15, 23, 42, 0.6);
      --success: #10b981;
      --error: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
      position: relative;
    }

    /* Background decorative blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.4;
      animation: float 10s infinite alternate ease-in-out;
    }
    .blob-1 {
      top: -10%;
      left: -10%;
      width: 500px;
      height: 500px;
      background: #6366f1;
    }
    .blob-2 {
      bottom: -10%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: #ec4899;
    }

    @keyframes float {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(30px) scale(1.1); }
    }

    .container {
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      z-index: 1;
      transition: all 0.3s ease;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .tabs {
      display: flex;
      background: rgba(0,0,0,0.2);
      padding: 0.35rem;
      border-radius: 12px;
      margin-bottom: 2rem;
    }

    .tab-btn {
      flex: 1;
      padding: 0.75rem 1rem;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }

    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #e2e8f0;
    }

    .form-group input {
      width: 100%;
      padding: 0.875rem 1.25rem;
      background: var(--input-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
    }

    .btn {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .link-forgot {
      display: block;
      text-align: right;
      color: var(--primary);
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      margin-top: -0.75rem;
      margin-bottom: 1.5rem;
      cursor: pointer;
    }

    .link-forgot:hover {
      text-decoration: underline;
    }

    .alert {
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      font-weight: 500;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .alert.success {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid var(--success);
      color: #34d399;
      display: block;
    }

    .alert.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid var(--error);
      color: #f87171;
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-view {
      display: none;
    }

    .form-view.active {
      display: block;
    }

    /* Logged in state */
    .logged-in-card {
      text-align: center;
    }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      margin: 0 auto 1.5rem;
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.5);
    }

    .token-box {
      background: var(--input-bg);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 1rem;
      border-radius: 12px;
      font-family: monospace;
      font-size: 0.8rem;
      color: #34d399;
      word-break: break-all;
      margin: 1.5rem 0;
      max-height: 100px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="container">
    
    <!-- HEADER -->
    <div class="header">
      <h1>Portal de Autenticação</h1>
      <p>Demonstração prática do módulo JWT & Nodemailer</p>
    </div>

    <!-- NOTIFICATIONS -->
    <div id="alertBox" class="alert"></div>

    <!-- TABS -->
    <div class="tabs" id="tabsGroup">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Cadastro</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="view-login" class="form-view active">
      <form id="formLogin" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label for="login-senha">Senha</label>
          <input type="password" id="login-senha" placeholder="••••••••" required>
        </div>
        <a class="link-forgot" onclick="switchTab('forgot')">Esqueceu sua senha?</a>
        <button type="submit" class="btn">Entrar</button>
      </form>
    </div>

    <!-- REGISTER FORM -->
    <div id="view-register" class="form-view">
      <form id="formRegister" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="reg-nome">Nome Completo</label>
          <input type="text" id="reg-nome" placeholder="João Silva" required>
        </div>
        <div class="form-group">
          <label for="reg-email">E-mail</label>
          <input type="email" id="reg-email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label for="reg-senha">Senha</label>
          <input type="password" id="reg-senha" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Criar Conta</button>
      </form>
    </div>

    <!-- FORGOT PASSWORD FORM -->
    <div id="view-forgot" class="form-view">
      <form id="formForgot" onsubmit="handleForgot(event)">
        <p style="margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
          Informe seu e-mail cadastrado para receber um link de redefinição de senha.
        </p>
        <div class="form-group">
          <label for="forgot-email">E-mail</label>
          <input type="email" id="forgot-email" placeholder="seu@email.com" required>
        </div>
        <button type="submit" class="btn">Enviar Link de Recuperação</button>
        <button type="button" class="btn" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); margin-top: 1rem;" onclick="switchTab('login')">Voltar para o Login</button>
      </form>
    </div>

    <!-- LOGGED IN VIEW -->
    <div id="view-loggedin" class="form-view">
      <div class="logged-in-card">
        <div class="avatar" id="userAvatar">U</div>
        <h2 id="userName" style="margin-bottom: 0.5rem;">Usuário</h2>
        <p id="userEmail" style="color: var(--text-secondary); font-size: 0.9rem;">email@teste.com</p>
        
        <div class="token-box" id="jwtTokenDisplay"></div>
        
        <button class="btn" style="background: var(--error);" onclick="handleLogout()">Sair da Conta</button>
      </div>
    </div>

  </div>

  <script>
    const alertBox = document.getElementById('alertBox');
    const tabsGroup = document.getElementById('tabsGroup');

    function showAlert(message, type = 'success') {
      alertBox.className = `alert ${type}`;
      alertBox.textContent = message;
      setTimeout(() => {
        alertBox.style.display = 'none';
        alertBox.className = 'alert';
      }, 6000);
    }

    function switchTab(tab) {
      document.querySelectorAll('.form-view').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      alertBox.style.display = 'none';

      // Desabilita todos os inputs para evitar que o navegador tente validar campos ocultos
      document.querySelectorAll('form input').forEach(input => input.disabled = true);

      if (tab === 'login') {
        tabsGroup.style.display = 'flex';
        document.getElementById('view-login').classList.add('active');
        document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
        document.querySelectorAll('#formLogin input').forEach(input => input.disabled = false);
      } else if (tab === 'register') {
        tabsGroup.style.display = 'flex';
        document.getElementById('view-register').classList.add('active');
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
        document.querySelectorAll('#formRegister input').forEach(input => input.disabled = false);
      } else if (tab === 'forgot') {
        tabsGroup.style.display = 'none';
        document.getElementById('view-forgot').classList.add('active');
        document.querySelectorAll('#formForgot input').forEach(input => input.disabled = false);
      } else if (tab === 'loggedin') {
        tabsGroup.style.display = 'none';
        document.getElementById('view-loggedin').classList.add('active');
      }
    }

    // Inicializa desabilitando os inputs dos formulários inativos
    window.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('form input').forEach(input => input.disabled = true);
      document.querySelectorAll('#formLogin input').forEach(input => input.disabled = false);
    });

    async function handleRegister(e) {
      e.preventDefault();
      const nome = document.getElementById('reg-nome').value;
      const email = document.getElementById('reg-email').value;
      const senha = document.getElementById('reg-senha').value;

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, email, senha })
        });
        const data = await res.json();

        if (res.ok) {
          showAlert('Conta criada com sucesso! (E-mail de confirmação simulado no console)', 'success');
          // Auto login ou switch to login
          setTimeout(() => switchTab('login'), 2000);
        } else {
          showAlert(data.erro || 'Erro ao criar conta', 'error');
        }
      } catch (err) {
        showAlert('Erro de conexão com o servidor', 'error');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const senha = document.getElementById('login-senha').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('usuario', JSON.stringify(data.usuario));
          showLoggedInState(data.usuario, data.token);
          showAlert('Login realizado com sucesso!', 'success');
        } else {
          showAlert(data.erro || 'Credenciais inválidas', 'error');
        }
      } catch (err) {
        showAlert('Erro de conexão com o servidor', 'error');
      }
    }

    async function handleForgot(e) {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value;

      try {
        const res = await fetch('/api/auth/recover-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (res.ok) {
          showAlert('E-mail de recuperação enviado com sucesso! (Verifique o console)', 'success');
          setTimeout(() => switchTab('login'), 3000);
        } else {
          showAlert(data.erro || 'Usuário não encontrado', 'error');
        }
      } catch (err) {
        showAlert('Erro de conexão com o servidor', 'error');
      }
    }

    function showLoggedInState(usuario, token) {
      document.getElementById('userName').textContent = usuario.nome;
      document.getElementById('userEmail').textContent = usuario.email;
      document.getElementById('userAvatar').textContent = usuario.nome.charAt(0).toUpperCase();
      document.getElementById('jwtTokenDisplay').textContent = token;
      switchTab('loggedin');
    }

    function handleLogout() {
      localStorage.removeItem('token');
      localStorage.removeItem('usuario');
      switchTab('login');
      showAlert('Você saiu da conta.', 'success');
    }

    // Check if already logged in
    window.onload = () => {
      const token = localStorage.getItem('token');
      const usuario = localStorage.getItem('usuario');
      if (token && usuario) {
        showLoggedInState(JSON.parse(usuario), token);
      }
    };
  </script>
</body>
</html>
